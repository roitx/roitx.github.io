<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Viewer - Roitx</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b1025; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        
        /* Header Styling */
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: #11183a; border-bottom: 1px solid #1e2652;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }
        .file-info b { display: block; font-size: 14px; color: #fff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .download-btn {
            background: linear-gradient(135deg,#4a8bff,#7b6bff); color: white; text-decoration: none;
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
        }

        /* Viewers Area */
        .main-viewer { width: 100%; height: calc(100vh - 65px); position: relative; }
        
        /* PDF Frame */
        #pdf-view { width: 100%; height: 100%; display: none; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Professional Image Viewer */
        #img-view { 
            display: none; width: 100%; height: 100%; background: #000;
            overflow: auto; justify-content: center; align-items: center;
        }
        #img-view img { 
            max-width: 90%; transition: transform 0.3s ease; 
            border-radius: 4px; cursor: zoom-in;
        }
        
        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 4px solid #f3f3f3; border-top: 4px solid #4a8bff;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="file-info" onclick="window.history.back()" style="cursor:pointer">
        <b id="file-title">📁 Loading...</b>
        <span id="file-type-label" style="font-size: 11px; color: #7b8bff;">Checking format</span>
    </div>
    <a id="download-link" class="download-btn" href="#" download>डाउनलोड करें</a>
</div>

<div class="main-viewer">
    <div id="loader" class="loader"></div>

    <div id="pdf-view">
        <iframe id="pdf-frame"></iframe>
    </div>

    <div id="img-view" onclick="zoomImage()">
        <img id="inner-img" src="" alt="Notes Content">
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const fileName = params.get("file");
    let isZoomed = false;

    async function init() {
        if(!fileName) {
            document.getElementById("file-title").innerText = "File missing!";
            return;
        }

        // 1. Fetch from Supabase
        const { data } = window.supabaseClient.storage
            .from("admin-files")
            .getPublicUrl(`notes/${fileName}`);

        const url = data.publicUrl;
        document.getElementById("download-link").href = url;
        document.getElementById("file-title").innerText = fileName.replace(/_/g, ' ');

        // 2. Identify Extension
        const ext = fileName.split('.').pop().toLowerCase();
        const pdfBox = document.getElementById("pdf-view");
        const imgBox = document.getElementById("img-view");
        const loader = document.getElementById("loader");

        if (ext === 'pdf') {
            document.getElementById("file-type-label").innerText = "Professional PDF Reader";
            pdfBox.style.display = "block";
            // Using Mozilla's PDF.js viewer for that specific toolbar UI you wanted
            document.getElementById("pdf-frame").src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(url)}`;
            loader.style.display = "none";
        } 
        else if (['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(ext)) {
            document.getElementById("file-type-label").innerText = "HD Image Viewer";
            imgBox.style.display = "flex";
            const imgTag = document.getElementById("inner-img");
            imgTag.src = url;
            imgTag.onload = () => { loader.style.display = "none"; };
        }
    }

    // Simple Zoom Toggle for Images
    function zoomImage() {
        const img = document.getElementById("inner-img");
        if(!isZoomed) {
            img.style.transform = "scale(2)";
            img.style.cursor = "zoom-out";
            isZoomed = true;
        } else {
            img.style.transform = "scale(1)";
            img.style.cursor = "zoom-in";
            isZoomed = false;
        }
    }

    init();
</script>

</body>
</html>
