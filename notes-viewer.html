<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roitx Smart Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a8bff; --bg: #0b1025; --surface: #11183a; --text: #ffffff; }
        body.sepia { --bg: #f4ecd8; --surface: #e6dac1; --text: #5b4636; }
        body.light { --bg: #f0f2f5; --surface: #ffffff; --text: #1a1a1a; }

        body, html { margin: 0; padding: 0; background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text); height: 100%; transition: 0.3s; overflow: hidden; }

        /* Header & Progress Bar */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--surface); height: 55px; position: sticky; top: 0; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }

        /* Main Viewer Area */
        #main-container { width: 100%; height: calc(100vh - 55px); overflow: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        #canvas-wrapper { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; min-width: min-content; position: relative; }
        canvas { max-width: 100%; height: auto !important; margin-bottom: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.3); border-radius: 4px; transition: transform 0.2s; }

        /* Reading Ruler */
        #reading-ruler { position: fixed; top: 50%; left: 0; width: 100%; height: 30px; background: rgba(74, 139, 255, 0.2); border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); pointer-events: none; display: none; z-index: 999; }

        /* Sidebar Features Menu */
        .menu-btn { position: fixed; right: 20px; bottom: 80px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1002; }
        .side-panel { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: var(--surface); z-index: 1003; transition: 0.4s; padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.3); overflow-y: auto; }
        .side-panel.active { right: 0; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .feature-item label { font-size: 13px; font-weight: 400; }

        /* Bottom Status Bar */
        .status-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 25px; background: var(--surface); font-size: 10px; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Floating Nav */
        .page-nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 5px 20px; border-radius: 30px; display: flex; gap: 20px; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; }

        .loader { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="reading-ruler"></div>

    <div class="header">
        <div style="display:flex; align-items:center;">
            <span onclick="window.history.back()" style="cursor:pointer; color:var(--primary); font-size:24px; margin-right:15px;">←</span>
            <div class="file-title"><b id="fname">Loading Doc...</b></div>
        </div>
        <div style="display:flex; gap:15px;">
            <span onclick="toggleFullscreen()" style="cursor:pointer;">📺</span>
            <a id="down-link" href="#" target="_blank" style="text-decoration:none; font-size:12px; background:#28a745; color:white; padding:5px 12px; border-radius:15px;">Download</a>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="main-container">
        <div id="loader" class="loader"></div>
        <div id="canvas-wrapper" ontouchstart="handleDoubleTap(event)"></div>
    </div>

    <div class="status-bar">
        <span id="battery-info">Battery: --%</span>
        <span id="read-time">Est. Read: -- min</span>
        <span id="current-time">00:00 AM</span>
    </div>

    <div class="page-nav">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <span style="font-size:12px;"><span id="pnum">0</span> / <span id="pcount">0</span></span>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>

    <button class="menu-btn" onclick="document.querySelector('.side-panel').classList.toggle('active')">⚙️</button>

    <div class="side-panel">
        <h3 style="margin-top:0; color:var(--primary);">Smart Tools</h3>
        <div class="feature-item">
            <label>Auto Scroll (Slow)</label>
            <input type="checkbox" onchange="toggleAutoScroll(this.checked)">
        </div>
        <div class="feature-item">
            <label>Reading Ruler</label>
            <input type="checkbox" onchange="document.getElementById('reading-ruler').style.display = this.checked ? 'block' : 'none'">
        </div>
        <div class="feature-item">
            <label>Night Mode</label>
            <button onclick="setTheme('dark')" style="font-size:10px;">Dark</button>
            <button onclick="setTheme('light')" style="font-size:10px;">Light</button>
            <button onclick="setTheme('sepia')" style="font-size:10px;">Sepia</button>
        </div>
        <div class="feature-item">
            <label>Pomodoro Timer</label>
            <button onclick="startPomodoro()" id="pomo-btn">Start 25m</button>
        </div>
        <div class="feature-item">
            <label>Rotate View</label>
            <button onclick="rotatePDF()">Rotate 90°</button>
        </div>
        <div class="feature-item">
            <label>Screen Stay Awake</label>
            <input type="checkbox" onchange="toggleWakeLock(this.checked)">
        </div>
        <p style="font-size:10px; color:#777; margin-top:30px;">Roitx v4.0 Pro Smart Reader - Manual Pinch Zoom Enabled</p>
    </div>

    <script>
const params = new URLSearchParams(location.search);
const fileName = params.get("file");
let pdfDoc = null, pageNum = 1, scale = 1.3, rotation = 0;
let autoScrollInterval = null;
let lastTap = 0;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function init() {
    if(!fileName) return;
    const fullPath = fileName.includes('/') ? fileName : `notes/${fileName}`;
    document.getElementById("fname").innerText = fileName.split('/').pop();

    try {
        const { data, error } = await window.supabaseClient.storage.from("admin-files").download(fullPath);
        if (error) throw error;
        
        const url = URL.createObjectURL(data);
        document.getElementById("down-link").href = url;

        pdfDoc = await pdfjsLib.getDocument(url).promise;
        document.getElementById("pcount").textContent = pdfDoc.numPages;
        document.getElementById("read-time").textContent = `Est. Read: ${pdfDoc.numPages * 2} min`;
        
        renderPage(pageNum);
        updateStatus();
        document.getElementById("loader").style.display = "none";
    } catch (e) { console.error(e); }
}

async function renderPage(num) {
    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale: scale, rotation: rotation });
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    
    canvas.height = viewport.height * dpr;
    canvas.width = viewport.width * dpr;
    canvas.style.width = viewport.width + "px";
    canvas.style.height = viewport.height + "px";
    ctx.scale(dpr, dpr);

    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.innerHTML = '';
    wrapper.appendChild(canvas);

    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    document.getElementById("pnum").textContent = num;
    updateProgress();
}

function changePage(delta) {
    if (!pdfDoc || pageNum + delta < 1 || pageNum + delta > pdfDoc.numPages) return;
    pageNum += delta;
    renderPage(pageNum);
}

// 20+ Smart Features Functions
function setTheme(mode) {
    document.body.className = mode;
}

function updateProgress() {
    let perc = (pageNum / pdfDoc.numPages) * 100;
    document.getElementById("progress-bar").style.width = perc + "%";
}

function toggleAutoScroll(active) {
    if(active) {
        autoScrollInterval = setInterval(() => {
            document.getElementById("main-container").scrollTop += 1;
        }, 50);
    } else {
        clearInterval(autoScrollInterval);
    }
}

function rotatePDF() {
    rotation = (rotation + 90) % 360;
    renderPage(pageNum);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function handleDoubleTap(e) {
    let now = new Date().getTime();
    if (now - lastTap < 300) {
        scale = scale === 1.3 ? 2.5 : 1.3;
        renderPage(pageNum);
    }
    lastTap = now;
}

function updateStatus() {
    // Battery Info
    navigator.getBattery?.().then(b => {
        document.getElementById("battery-info").innerText = `Battery: ${Math.round(b.level*100)}%`;
    });
    // Clock
    setInterval(() => {
        document.getElementById("current-time").innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
}

function startPomodoro() {
    let time = 25 * 60;
    const btn = document.getElementById("pomo-btn");
    let timer = setInterval(() => {
        let min = Math.floor(time/60);
        let sec = time % 60;
        btn.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if(time-- <= 0) { clearInterval(timer); alert("Time to take a break!"); btn.innerText = "Start 25m"; }
    }, 1000);
}

async function toggleWakeLock(active) {
    if (active && 'wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch (err) {}
    }
}

init();
</script>
</body>
</html>
