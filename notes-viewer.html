<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Viewer - Roitx</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b1025; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #11183a; border-bottom: 1px solid #1e2652;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
        }
        .file-info b { font-size: 14px; color: #fff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .main-viewer { width: 100%; height: calc(100vh - 65px); position: relative; background: #323639; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        .loader { border: 4px solid #333; border-top: 4px solid #4a8bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="display:flex; align-items:center; cursor:pointer;" onclick="window.history.back()">
        <span style="color:#4a8bff; margin-right:10px;">⬅</span>
        <div class="file-info">
            <b id="file-title">📁 Loading...</b>
            <span style="font-size: 11px; color: #7b8bff;">Official Premium Reader</span>
        </div>
    </div>
    <div style="font-size: 12px; font-weight: bold; color: #4a8bff; border: 1px solid #4a8bff; padding: 2px 8px; border-radius: 4px;">ROITX</div>
</div>

<div class="main-viewer">
    <div id="loader" class="loader-box">
        <div class="loader"></div>
        <div style="font-size: 12px; color: #aaa;">Syncing Document...</div>
    </div>
    <iframe id="pdf-frame" allowfullscreen></iframe>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const fileName = params.get("file");

    async function init() {
        if(!fileName) return;

        // 1. File Path Set Karein
        const fullPath = fileName.includes('/') ? fileName : `notes/${fileName}`;
        document.getElementById("file-title").innerText = fileName.split('/').pop().replace(/_/g, ' ');

        try {
            // 2. Supabase se direct file download karein (As a Blob)
            const { data, error } = await window.supabaseClient.storage
                .from("admin-files")
                .download(fullPath);

            if (error) throw error;

            // 3. Local Blob URL banayein (Browser isse block nahi karega)
            const blobUrl = URL.createObjectURL(data);

            // 4. Mozilla Viewer load karein
            const viewerUrl = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(blobUrl)}`;
            const iframe = document.getElementById("pdf-frame");
            iframe.src = viewerUrl;

            iframe.onload = () => {
                document.getElementById("loader").style.display = "none";
            };

        } catch (err) {
            console.error("Load failed:", err);
            // Fallback: Agar storage se download fail ho to Public URL try karein
            const { data } = window.supabaseClient.storage.from("admin-files").getPublicUrl(fullPath);
            document.getElementById("pdf-frame").src = `https://docs.google.com/viewer?url=${encodeURIComponent(data.publicUrl)}&embedded=true`;
            document.getElementById("loader").style.display = "none";
        }
    }

    init();
</script>
</body>
</html>
