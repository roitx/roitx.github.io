<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Viewer - Roitx</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b1025; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        
        /* Premium Header */
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #11183a; border-bottom: 1px solid #1e2652;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }
        .file-info { display: flex; align-items: center; gap: 10px; }
        .file-info b { display: block; font-size: 14px; color: #fff; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .back-icon { cursor: pointer; font-size: 18px; color: #4a8bff; }

        .main-viewer { width: 100%; height: calc(100vh - 60px); position: relative; background: #000; }
        #pdf-view, #img-view { width: 100%; height: 100%; display: none; }
        iframe { width: 100%; height: 100%; border: none; background: #323639; } /* Dark theme for PDF loader */

        /* Image Viewer Styling */
        #img-view { justify-content: center; align-items: center; overflow: auto; }
        #img-view img { max-width: 95%; transition: transform 0.3s ease; border-radius: 4px; cursor: zoom-in; }
        
        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 4px solid #333; border-top: 4px solid #4a8bff;
            border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="file-info">
        <span class="back-icon" onclick="window.history.back()">⬅</span>
        <div>
            <b id="file-title">📁 Loading File...</b>
            <span id="file-type-label" style="font-size: 11px; color: #7b8bff;">Roitx Smart Viewer</span>
        </div>
    </div>
    <div style="font-size: 12px; font-weight: 600; color: #4a8bff;">PREMIUM NOTES</div>
</div>

<div class="main-viewer">
    <div id="loader" class="loader"></div>
    <div id="pdf-view">
        <iframe id="pdf-frame" allowfullscreen webkitallowfullscreen></iframe>
    </div>
    <div id="img-view" onclick="zoomImage()">
        <img id="inner-img" src="">
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const fileName = params.get("file");
    let isZoomed = false;

    async function init() {
        if(!fileName) {
            document.getElementById("file-title").innerText = "No file selected";
            document.getElementById("loader").style.display = "none";
            return;
        }

        // 1. Get URL from Supabase
        const fullPath = fileName.includes('/') ? fileName : `notes/${fileName}`;
        const { data } = window.supabaseClient.storage.from("admin-files").getPublicUrl(fullPath);
        const url = data.publicUrl;
        
        const nameOnly = fileName.split('/').pop();
        document.getElementById("file-title").innerText = nameOnly.replace(/_/g, ' ');

        const ext = nameOnly.split('.').pop().toLowerCase();
        const pdfBox = document.getElementById("pdf-view");
        const imgBox = document.getElementById("img-view");
        const loader = document.getElementById("loader");

        if (ext === 'pdf') {
            document.getElementById("file-type-label").innerText = "Professional PDF Reader";
            pdfBox.style.display = "block";
            
            // Mozilla Viewer Full Feature Link
            // Note: Isme toolbar, download, print, sidebar sab enabled hota hai
            const mozillaViewer = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(url)}`;
            const iframe = document.getElementById("pdf-frame");
            iframe.src = mozillaViewer;
            
            iframe.onload = () => { loader.style.display = "none"; };
        } 
        else if (['png', 'jpg', 'jpeg', 'webp'].includes(ext)) {
            document.getElementById("file-type-label").innerText = "HD Image Viewer";
            imgBox.style.display = "flex";
            const imgTag = document.getElementById("inner-img");
            imgTag.src = url;
            imgTag.onload = () => { loader.style.display = "none"; };
        }
    }

    function zoomImage() {
        const img = document.getElementById("inner-img");
        isZoomed = !isZoomed;
        img.style.transform = isZoomed ? "scale(2)" : "scale(1)";
        img.style.cursor = isZoomed ? "zoom-out" : "zoom-in";
    }

    init();
</script>
</body>
</html>
