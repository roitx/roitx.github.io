<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roitx Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="viewer-style.css">
</head>
<body class="dark-theme">

    <header class="navbar">
        <button class="nav-icon" onclick="window.history.back()">✕</button>
        <div class="nav-title">
            <span id="doc-title">Loading...</span>
            <small id="doc-stats">Initializing...</small>
        </div>
        <button class="nav-icon menu-trigger" onclick="toggleMenu(true)">
            <svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
        </button>
    </header>

    <main id="main-viewport">
        <div id="loading-screen">
            <div class="loader-bar"></div>
            <p>Rendering HD Pages...</p>
        </div>
        <div id="canvas-wrapper"></div>
    </main>

    <div class="action-pill">
        <div class="pill-group">
            <button onclick="changePage(-1)">Prev</button>
            <div class="pill-info">
                <input type="number" id="page-num" value="1"> <span>/</span> <span id="total-pages">0</span>
            </div>
            <button onclick="changePage(1)">Next</button>
        </div>
        <div class="pill-divider"></div>
        <div class="pill-group">
            <button class="zoom-btn" onclick="updateZoom(-0.2)">−</button>
            <button class="zoom-btn" onclick="updateZoom(0.2)">+</button>
        </div>
    </div>

    <div id="side-drawer" class="drawer">
        <div class="drawer-header">
            <h3>Reader Settings</h3>
            <button onclick="toggleMenu(false)">Close</button>
        </div>
        <div class="drawer-body">
            <div class="setting-item">
                <label>Theme</label>
                <div class="theme-switch">
                    <button onclick="setTheme('light')">Light</button>
                    <button onclick="setTheme('dark')">Dark</button>
                    <button onclick="setTheme('sepia')">Sepia</button>
                </div>
            </div>
            <div class="setting-item">
                <label>Reading Aids</label>
                <button class="toggle-btn" onclick="toggleFullscreen()">Toggle Fullscreen</button>
                <button class="toggle-btn" onclick="rotateDoc()">Rotate Page</button>
            </div>
            <div class="setting-item">
                <label>Cloud</label>
                <button id="dl-button" class="download-btn">Save Offline</button>
            </div>
        </div>
    </div>
    <div id="drawer-overlay" onclick="toggleMenu(false)"></div>

    <script src="viewer-main.js"></script>
</body>
</html>
