<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roitx Smart Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a8bff; --bg: #0b1025; --surface: #11183a; --text: #ffffff; }
        body.sepia { --bg: #f4ecd8; --surface: #e6dac1; --text: #5b4636; }
        body.light { --bg: #f0f2f5; --surface: #ffffff; --text: #1a1a1a; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text); height: 100%; transition: 0.3s; overflow: hidden; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--surface); height: 55px; position: relative; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .file-title { font-size: 13px; font-weight: 600; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Viewer Container - Anti Lag */
        #main-container { width: 100%; height: calc(100vh - 55px); overflow: auto; -webkit-overflow-scrolling: touch; position: relative; }
        #canvas-wrapper { display: flex; flex-direction: column; align-items: center; padding: 15px; transform-origin: top center; transition: transform 0.1s ease-out; }
        canvas { max-width: 100%; height: auto !important; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 4px; background: white; }

        /* Overlay & Side Panel */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1002; display: none; backdrop-filter: blur(2px); }
        .side-panel { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: var(--surface); z-index: 1003; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-shadow: -5px 0 20px rgba(0,0,0,0.4); }
        .side-panel.active { right: 0; }
        .close-panel { position: absolute; top: 15px; left: 15px; font-size: 22px; cursor: pointer; color: var(--primary); }

        /* Features UI */
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .feature-item label { font-size: 13px; }
        .btn-tool { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }

        /* Floating Navigation */
        .page-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 8px 18px; border-radius: 40px; display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .nav-btn { background: none; border: none; color: var(--primary); font-size: 24px; cursor: pointer; padding: 0 10px; }

        .loader { width: 35px; height: 35px; border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--primary); transition: 0.3s; width: 0%; }
        #reading-ruler { position: fixed; top: 50%; left: 0; width: 100%; height: 40px; background: rgba(74, 139, 255, 0.15); border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); pointer-events: none; display: none; z-index: 999; }
    </style>
</head>
<body class="dark">

    <div id="overlay" onclick="toggleSettings(false)"></div>
    <div id="reading-ruler"></div>

    <div class="header">
        <div style="display:flex; align-items:center;">
            <span onclick="window.history.back()" style="cursor:pointer; color:var(--primary); font-size:24px; margin-right:12px;">←</span>
            <div class="file-title" id="fname">Smart Reader</div>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <span onclick="toggleSettings(true)" style="cursor:pointer; font-size:20px;">⚙️</span>
            <a id="down-link" href="#" target="_blank" style="text-decoration:none; font-size:11px; background:#28a745; color:white; padding:6px 12px; border-radius:20px; font-weight:600;">Download</a>
        </div>
        <div id="progress-bar"></div>
    </div>

    <div id="main-container">
        <div id="loader" class="loader"></div>
        <div id="canvas-wrapper"></div>
    </div>

    <div class="page-nav">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <span style="font-size:12px; font-weight:600; min-width:45px; text-align:center;"><span id="pnum">0</span> / <span id="pcount">0</span></span>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>

    <div class="side-panel" id="sidePanel">
        <span class="close-panel" onclick="toggleSettings(false)">×</span>
        <h3 style="margin: 10px 0 25px 0; color:var(--primary); text-align:center;">Smart Tools</h3>
        
        <div class="feature-item"><label>Auto Scroll</label><input type="checkbox" onchange="toggleAutoScroll(this.checked)"></div>
        <div class="feature-item"><label>Reading Ruler</label><input type="checkbox" onchange="document.getElementById('reading-ruler').style.display = this.checked ? 'block' : 'none'"></div>
        <div class="feature-item"><label>Themes</label>
            <div style="display:flex; gap:5px;">
                <button class="btn-tool" onclick="setTheme('light')">☀</button>
                <button class="btn-tool" onclick="setTheme('dark')">🌙</button>
                <button class="btn-tool" onclick="setTheme('sepia')">📖</button>
            </div>
        </div>
        <div class="feature-item"><label>Zoom Level</label>
            <div style="display:flex; gap:5px;">
                <button class="btn-tool" onclick="fastZoom(-0.2)">-</button>
                <button class="btn-tool" onclick="fastZoom(0.2)">+</button>
            </div>
        </div>
        <div class="feature-item"><label>Rotate</label><button class="btn-tool" onclick="rotatePDF()">90°</button></div>
        <div class="feature-item"><label>Screen Awake</label><input type="checkbox" onchange="toggleWakeLock(this.checked)"></div>
        <div class="feature-item"><label>Full Screen</label><button class="btn-tool" onclick="toggleFullscreen()">Toggle</button></div>

        <p style="font-size:9px; color:#666; margin-top:40px; text-align:center;">Roitx Premium Reader v5.0<br>Manual Pinch Zoom Active</p>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const fileName = params.get("file");
        let pdfDoc = null, pageNum = 1, currentScale = 1.2, rotation = 0;
        let autoScrollInterval = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function init() {
            if(!fileName) return;
            const fullPath = fileName.includes('/') ? fileName : `notes/${fileName}`;
            document.getElementById("fname").innerText = fileName.split('/').pop().replace(/_/g, ' ');

            try {
                const { data, error } = await window.supabaseClient.storage.from("admin-files").download(fullPath);
                if (error) throw error;
                const url = URL.createObjectURL(data);
                document.getElementById("down-link").href = url;
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                document.getElementById("pcount").textContent = pdfDoc.numPages;
                renderPage(pageNum);
                document.getElementById("loader").style.display = "none";
            } catch (e) { console.error(e); }
        }

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: currentScale, rotation: rotation });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const dpr = Math.min(window.devicePixelRatio || 1, 2); // Cap DPR to 2 for performance
            
            canvas.height = viewport.height * dpr;
            canvas.width = viewport.width * dpr;
            canvas.style.width = viewport.width + "px";
            canvas.style.height = viewport.height + "px";
            ctx.scale(dpr, dpr);

            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.innerHTML = '';
            wrapper.appendChild(canvas);
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            document.getElementById("pnum").textContent = num;
            document.getElementById("progress-bar").style.width = (num / pdfDoc.numPages * 100) + "%";
        }

        function changePage(delta) {
            if (!pdfDoc || pageNum + delta < 1 || pageNum + delta > pdfDoc.numPages) return;
            pageNum += delta;
            renderPage(pageNum);
            document.getElementById("main-container").scrollTop = 0;
        }

        function toggleSettings(show) {
            const panel = document.getElementById("sidePanel");
            const overlay = document.getElementById("overlay");
            if(show) { panel.classList.add("active"); overlay.style.display = "block"; }
            else { panel.classList.remove("active"); overlay.style.display = "none"; }
        }

        function fastZoom(delta) {
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 3.0);
            renderPage(pageNum);
        }

        function setTheme(m) { document.body.className = m; toggleSettings(false); }
        function toggleAutoScroll(a) { if(a) autoScrollInterval = setInterval(() => document.getElementById("main-container").scrollTop += 1, 40); else clearInterval(autoScrollInterval); }
        function rotatePDF() { rotation = (rotation + 90) % 360; renderPage(pageNum); }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        async function toggleWakeLock(a) { if (a && 'wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch(e){} }
        
        init();
    </script>
</body>
</html>
