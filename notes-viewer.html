<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roitx Premium Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background: #0b1025; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; height: 100%; }
        
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: #11183a; border-bottom: 1px solid #1e2652;
            height: 50px;
        }
        .file-info b { font-size: 14px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Toolbar Styles */
        .pdf-toolbar {
            background: #1c2242; color: white; padding: 8px;
            display: flex; justify-content: space-around; align-items: center;
            font-size: 13px; border-bottom: 1px solid #333;
        }
        .t-btn { background: #4a8bff; border: none; color: white; padding: 5px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .t-btn:disabled { background: #333; cursor: not-allowed; }

        /* Main Viewport */
        #viewport-container {
            width: 100%; height: calc(100vh - 110px);
            overflow: auto; background: #1e1e2e;
            display: flex; justify-content: center;
        }
        canvas { display: block; margin: 15px 0; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 3px solid #333; border-top: 3px solid #4a8bff;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="display:flex; align-items:center;" onclick="window.history.back()">
        <span style="color:#4a8bff; margin-right:10px; cursor:pointer;">⬅</span>
        <div class="file-info">
            <b id="file-title">Loading...</b>
        </div>
    </div>
    <button id="download-btn" class="t-btn" style="background:#28a745">डाउनलोड</button>
</div>

<div class="pdf-toolbar">
    <button class="t-btn" id="prev-page">Prev</button>
    <span>Page <span id="page-num">1</span> / <span id="page-count">0</span></span>
    <button class="t-btn" id="next-page">Next</button>
    <button class="t-btn" id="zoom-out">－</button>
    <button class="t-btn" id="zoom-in">＋</button>
</div>

<div id="viewport-container">
    <div id="loader" class="loader"></div>
    <div id="canvas-wrapper"></div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const fileName = params.get("file");
    
    let pdfDoc = null, pageNum = 1, scale = 1.3, canvasWrapper = document.getElementById('canvas-wrapper');

    async function init() {
        if(!fileName) return;
        const fullPath = fileName.includes('/') ? fileName : `notes/${fileName}`;
        document.getElementById("file-title").innerText = fileName.split('/').pop();

        try {
            // Supabase se direct download (As a Blob)
            const { data, error } = await window.supabaseClient.storage.from("admin-files").download(fullPath);
            if (error) throw error;

            const url = URL.createObjectURL(data);
            document.getElementById("download-btn").onclick = () => window.open(url, '_blank');

            // Initialize PDF.js
            const loadingTask = pdfjsLib.getDocument(url);
            pdfDoc = await loadingTask.promise;
            document.getElementById("page-count").textContent = pdfDoc.numPages;
            
            renderPage(pageNum);
            document.getElementById("loader").style.display = "none";
        } catch (e) {
            console.error(e);
            alert("File load karne me dikkat aa rahi hai.");
        }
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: scale });
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        canvasWrapper.innerHTML = '';
        canvasWrapper.appendChild(canvas);

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById("page-num").textContent = num;
    }

    // Events
    document.getElementById('prev-page').addEventListener('click', () => {
        if (pageNum <= 1) return;
        pageNum--;
        renderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        renderPage(pageNum);
    });

    document.getElementById('zoom-in').addEventListener('click', () => { scale += 0.2; renderPage(pageNum); });
    document.getElementById('zoom-out').addEventListener('click', () => { if(scale <= 0.8) return; scale -= 0.2; renderPage(pageNum); });

    init();
</script>
</body>
</html>
